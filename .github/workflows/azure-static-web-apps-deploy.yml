name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --no-audit

      - name: Build Frontend
        working-directory: ./frontend
        run: npx vite build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api-transformacion-sdg.azurewebsites.net' }}
          VITE_TENANT_ID: ${{ vars.VITE_TENANT_ID }}
          VITE_CLIENT_ID: ${{ vars.VITE_CLIENT_ID }}
          VITE_BYPASS_AUTH: 'false'

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_81WZN16DV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          skip_app_build: true
